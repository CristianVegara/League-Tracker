<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liga Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0f17;
    --surface: #131924;
    --surface-2: #1c2436;
    --border: #263147;
    --border-hover: #3b4c6e;
    --text: #f3f5f9;
    --text-dim: #94a3b8;
    --accent: #f59e0b;
    --accent-glow: rgba(245, 158, 11, 0.15);
    --accent-dim: #2b2212;
    --win: #10b981;
    --win-bg: rgba(16, 185, 129, 0.1);
    --draw: #64748b;
    --draw-bg: rgba(100, 116, 139, 0.12);
    --loss: #ef4444;
    --loss-bg: rgba(239, 68, 68, 0.1);
    --gold: #fbbf24;
    --silver: #94a3b8;
    --bronze: #d97706;
    --font-display: 'Oswald', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * {
    box-sizing: border-box;
  }
  
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.01em;
  }

  ::selection {
    background: var(--accent);
    color: #0b0f17;
  }

  a, button, input, select {
    font-family: inherit;
  }

  button {
    cursor: pointer;
  }

  .app {
    max-width: 1040px;
    margin: 0 auto;
    padding: 40px 24px 100px;
  }

  /* Header Branding */
  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 40px;
    flex-wrap: wrap;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
  }

  .app-header h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 32px;
    letter-spacing: 0.04em;
    margin: 0;
    text-transform: uppercase;
    background: linear-gradient(to right, #ffffff, #cbd5e1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .app-header h1 span {
    background: linear-gradient(to right, var(--accent), #f59e0b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-left: 2px;
  }

  .app-header .sub {
    color: var(--text-dim);
    font-size: 14px;
    font-family: var(--font-mono);
    background: var(--surface);
    padding: 6px 14px;
    border-radius: 99px;
    border: 1px solid var(--border);
  }

  /* Buttons & Interactions */
  .btn {
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text);
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
  }

  .btn:hover:not(:disabled) {
    border-color: var(--border-hover);
    background: #242f47;
    transform: translateY(-1px);
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.15);
  }

  .btn:active:not(:disabled) {
    transform: translateY(0);
  }

  .btn-accent {
    background: linear-gradient(135deg, #f59e0b, #d97706);
    color: #0b0f17;
    border: none;
    font-weight: 700;
  }

  .btn-accent:hover:not(:disabled) {
    background: linear-gradient(135deg, #fbbf24, #f59e0b);
    box-shadow: 0 0 14px var(--accent-glow);
  }

  .btn-ghost {
    background: transparent;
    border-color: transparent;
    color: var(--text-dim);
    box-shadow: none;
  }

  .btn-ghost:hover:not(:disabled) {
    color: var(--loss);
    background: var(--loss-bg);
    border-color: transparent;
  }

  .btn-sm {
    padding: 6px 12px;
    font-size: 12px;
    border-radius: 6px;
  }

  .btn:focus-visible, input:focus-visible, select:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .btn:disabled {
    opacity: 0.25;
    cursor: not-allowed;
    transform: none !important;
    box-shadow: none !important;
  }

  .score-display {
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 15px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    min-width: 32px;
    text-align: center;
    color: var(--accent);
  }

  /* Grid Layouts & Cards */
  .league-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .league-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
  }

  .league-card:hover {
    border-color: var(--border-hover);
    transform: translateY(-4px);
    box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4);
  }

  .league-card .name {
    font-family: var(--font-body);
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.02em;
    line-height: 1.3;
  }

  .league-card .meta {
    color: var(--text-dim);
    font-size: 13px;
    font-family: var(--font-mono);
  }

  .league-card .row {
    display: flex;
    gap: 10px;
    margin-top: auto;
    padding-top: 12px;
  }

  .league-card .row .btn {
    flex: 1;
  }

  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-dim);
    border: 2px dashed var(--border);
    border-radius: 14px;
    background: rgba(19, 25, 36, 0.3);
  }

  .empty-state .big {
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 18px;
    color: var(--text);
    margin-bottom: 8px;
  }

  /* Dashboard View Controls */
  .league-topbar {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .league-topbar h2 {
    font-family: var(--font-body);
    font-weight: 800;
    font-size: 26px;
    margin: 0;
    letter-spacing: -0.02em;
  }

  .league-topbar .spacer {
    flex: 1;
  }

  /* Elegant Tabs */
  .tabs {
    display: flex;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }

  .tab {
    padding: 12px 20px;
    font-weight: 600;
    font-size: 14px;
    color: var(--text-dim);
    border: none;
    background: none;
    position: relative;
    transition: color 0.15s ease;
    padding-bottom: 16px;
  }

  .tab:hover:not(.active) {
    color: var(--text);
  }

  .tab.active {
    color: var(--accent);
    font-weight: 700;
  }

  .tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  /* Containers & Panels */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
  }

  .panel + .panel {
    margin-top: 20px;
  }

  .panel h3 {
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    margin: 0 0 20px;
  }

  /* Dynamic Form Configurations */
  .form-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: flex-end;
    background: var(--surface-2);
    padding: 18px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 700;
  }

  input, select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
    transition: all 0.15s ease;
  }

  input:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
    background: var(--surface-2);
  }

  input[type=number] {
    width: 90px;
    font-family: var(--font-mono);
  }

  input[type=text] {
    min-width: 200px;
  }

  select {
    min-width: 180px;
  }

  /* Chips & Tags */
  .player-list {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 20px;
  }

  .player-chip {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 6px 8px 6px 16px;
    font-size: 14px;
    font-weight: 500;
    transition: border-color 0.15s ease;
  }

  .player-chip:hover {
    border-color: var(--border-hover);
  }

  .player-chip button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.15s ease;
  }

  .player-chip button:hover {
    background: var(--loss);
    border-color: var(--loss);
    color: #fff;
  }

  /* Matches List Layout */
  .jornada-group {
    margin-bottom: 28px;
  }

  .jornada-group:last-of-type {
    margin-bottom: 0;
  }

  .jornada-label {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 12px;
    font-weight: 700;
  }

  .match-row {
    display: grid;
    grid-template-columns: 1fr auto auto auto 1fr auto auto;
    align-items: center;
    gap: 14px;
    padding: 12px 20px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface-2);
    margin-bottom: 8px;
    font-size: 14px;
    transition: border-color 0.15s ease;
  }

  .match-row:hover {
    border-color: var(--border-hover);
  }

  .match-row .pname {
    font-weight: 600;
    text-align: right;
    color: #fff;
  }

  .match-row .pname.away {
    text-align: left;
  }

  .match-row .score {
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 15px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    min-width: 32px;
    text-align: center;
  }

  .match-row .dash {
    color: var(--text-dim);
    font-weight: bold;
  }

  .badge {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    text-align: center;
  }

  .badge.vl, .badge.vv {
    background: var(--win-bg);
    color: var(--win);
  }

  .badge.e {
    background: var(--draw-bg);
    color: var(--draw);
  }

  .badge.pending {
    background: rgba(148, 163, 184, 0.08);
    color: var(--text-dim);
  }

  .match-actions {
    display: flex;
    gap: 6px;
  }

  .score-input {
    width: 58px !important;
    text-align: center;
    font-weight: 700;
    font-size: 15px;
    padding: 6px 4px;
  }

  @media (max-width: 768px) {
    .match-row {
      grid-template-columns: 1fr;
      text-align: left;
      gap: 10px;
      padding: 16px;
    }
    .match-row .pname {
      text-align: left;
    }
    .match-row .badge, .match-actions {
      justify-self: start;
    }
  }

  /* High-fidelity Standings Table */
  table.standings {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    font-size: 14px;
  }

  table.standings th {
    text-align: center;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 12px 10px;
    border-bottom: 2px solid var(--border);
    font-weight: 700;
  }

  table.standings th:nth-child(2) {
    text-align: left;
  }

  table.standings td {
    padding: 14px 10px;
    text-align: center;
    font-family: var(--font-mono);
    border-bottom: 1px solid var(--border);
  }

  table.standings td:nth-child(2) {
    text-align: left;
    font-family: var(--font-body);
    font-weight: 600;
    color: #fff;
  }

  table.standings th:last-child, table.standings td:last-child {
    font-weight: 700;
    color: var(--accent);
    background: rgba(245, 158, 11, 0.02);
  }

  table.standings tr:hover td {
    background: rgba(255, 255, 255, 0.02);
  }

  table.standings tr:last-child td {
    border-bottom: none;
  }

  .pos-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    border-radius: 6px;
    font-weight: 700;
    font-size: 12px;
    color: #0b0f17;
  }

  .pos-1 { background: var(--gold); }
  .pos-2 { background: var(--silver); }
  .pos-3 { background: var(--bronze); }

  /* Utility Panels & Elements */
  .toolbar {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 24px;
    flex-wrap: wrap;
  }

  .hint {
    color: var(--text-dim);
    font-size: 13px;
    line-height: 1.5;
    margin-top: 12px;
  }

  input[type=file] {
    display: none;
  }

  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--surface-2);
    border: 1px solid var(--accent);
    color: var(--text);
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    opacity: 0;
    pointer-events: none;
    transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5), 0 0 12px var(--accent-glow);
    z-index: 100;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Professional Modal Wizard */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(5, 7, 11, 0.85);
    backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 50;
  }

  .modal-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
  }

  .wizard-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 14px;
  }

  .wizard-header h3 {
    font-family: var(--font-body);
    font-size: 22px;
    font-weight: 700;
    margin: 0;
  }

  .wizard-progress {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
  }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 28px;
  }

  .modal-panel .field {
    margin-bottom: 12px;
  }

  .modal-panel .hint strong {
    color: var(--text);
  }

  .radio-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 10px;
  }

  .radio-option {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    background: var(--surface-2);
    padding: 12px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    transition: all 0.15s ease;
  }

  .radio-option:hover {
    border-color: var(--border-hover);
  }

  .radio-option input {
    width: auto;
    accent-color: var(--accent);
  }

  .matches-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    flex-wrap: wrap;
  }

  .matches-toolbar-actions {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  /* Competition Sections & Filters */
  .comp-section {
    margin-bottom: 48px;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 14px;
    margin-bottom: 20px;
  }

  .section-header h2 {
    font-family: var(--font-body);
    font-size: 22px;
    font-weight: 700;
    margin: 0;
  }

  .section-header-actions {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .filter-pills {
    display: flex;
    gap: 4px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 4px;
  }

  .filter-pill {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 99px;
    transition: all 0.15s ease;
  }

  .filter-pill.active {
    background: var(--accent);
    color: #0b0f17;
  }

  .filter-pill:hover:not(.active) {
    color: var(--text);
  }

  .card-badges {
    display: flex;
    gap: 6px;
    margin-bottom: 4px;
  }

  .status-badge {
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 4px 10px;
    border-radius: 6px;
    font-weight: 700;
  }

  .status-badge.active {
    background: var(--win-bg);
    color: var(--win);
  }

  .status-badge.finished {
    background: rgba(148, 163, 184, 0.12);
    color: var(--text-dim);
  }

  /* Tournaments & Brackets */
  .type-badge {
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 4px 10px;
    border-radius: 6px;
    font-weight: 700;
    background: var(--accent-glow);
    color: var(--accent);
    border: 1px solid rgba(245, 158, 11, 0.2);
  }

  .badge.bye {
    background: var(--accent-glow);
    color: var(--accent);
  }

  .bye-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 20px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface-2);
    margin-bottom: 8px;
    font-size: 14px;
  }

  .champion-banner {
    text-align: center;
    font-family: var(--font-body);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--gold);
    padding: 20px;
    border: 1px solid var(--gold);
    background: rgba(251, 191, 36, 0.05);
    border-radius: 14px;
    margin-bottom: 24px;
    box-shadow: 0 0 20px rgba(251, 191, 36, 0.1);
  }

  .playoff-bracket {
    display: flex;
    gap: 32px;
    overflow-x: auto;
    padding: 10px 0 20px;
  }

  .playoff-round {
    display: flex;
    flex-direction: column;
    gap: 24px;
    min-width: 250px;
    flex-shrink: 0;
    justify-content: center;
  }

  .playoff-round-label {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 700;
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
    margin-bottom: 4px;
  }

  .playoff-match {
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }

  .po-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .po-player {
    font-weight: 600;
    font-size: 14px;
    color: var(--text-dim);
  }

  .po-player.winner {
    color: var(--win);
    font-weight: 700;
  }

  .playoff-match .score-input {
    width: 48px !important;
    font-size: 14px;
    padding: 4px;
  }

  .score-input.placeholder {
    display: inline-block;
    width: 48px;
    text-align: center;
    color: var(--text-dim);
    opacity: 0.4;
    font-family: var(--font-mono);
    font-weight: 700;
  }
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  const STORAGE_KEY = "liga-tracker-data-v1";

  function uid(){ return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }

  function loadData(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return { leagues: [], activeLeagueId: null };
      const parsed = JSON.parse(raw);
      if(!parsed.leagues) return { leagues: [], activeLeagueId: null };
      return parsed;
    }catch(e){
      console.error("No se pudo leer el almacenamiento local", e);
      return { leagues: [], activeLeagueId: null };
    }
  }

  function saveData(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data));
    }catch(e){
      showToast("No se pudo guardar (almacenamiento lleno o bloqueado)");
      console.error(e);
    }
  }

  const state = {
    data: loadData(),
    activeTab: "jugadores", // jugadores | partidos | clasificacion | rondas | playoffs
    wizard: null, // { step, type, name, players, numRounds }
    manualFormOpen: false,
    homeFilters: { league: "all", tournament: "all" } // all | active | finished
  };

  function getActiveLeague(){
    return state.data.leagues.find(l => l.id === state.data.activeLeagueId) || null;
  }

  function showToast(msg){
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(showToast._timer);
    showToast._timer = setTimeout(()=> t.classList.remove("show"), 2200);
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  function isFinished(comp){
    return comp.status === "finished";
  }

  function playoffsOn(t){
    return t.playoffsEnabled !== false;
  }

  function formatDate(ts){
    if(!ts) return "";
    const d = new Date(ts);
    const dd = String(d.getDate()).padStart(2, "0");
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    return `${dd}/${mm}/${d.getFullYear()}`;
  }

  // ---------- Round-robin fixture generation ----------
  function isPlayed(m){
    if(m.isBye) return true;
    return m.mapsA !== null && m.mapsA !== undefined && m.mapsB !== null && m.mapsB !== undefined;
  }

  // Classic "circle method": returns array of rounds, each an array of [playerA, playerB] pairs.
  // Guarantees every pair plays exactly once, and no player appears twice within the same round.
  function circleMethod(playerIds){
    let ids = playerIds.slice();
    if(ids.length % 2 !== 0) ids.push(null); // null = bye
    const n = ids.length;
    const fixed = ids[0];
    let rest = ids.slice(1);
    const rounds = [];
    for(let r = 0; r < n - 1; r++){
      const roundIds = [fixed, ...rest];
      const roundMatches = [];
      for(let i = 0; i < n / 2; i++){
        const a = roundIds[i];
        const b = roundIds[n - 1 - i];
        if(a !== null && b !== null) roundMatches.push([a, b]);
      }
      rounds.push(roundMatches);
      rest.unshift(rest.pop());
    }
    return rounds;
  }

  // Interleave matches across the classic rounds so consecutive matches in the
  // flat list tend to involve different players (helps even distribution later).
  function flattenInterleaved(rounds){
    const maxLen = Math.max(0, ...rounds.map(r => r.length));
    const flat = [];
    for(let i = 0; i < maxLen; i++){
      for(let r = 0; r < rounds.length; r++){
        if(rounds[r][i]) flat.push(rounds[r][i]);
      }
    }
    return flat;
  }

  // Greedily bucket matches into `numRounds` slots: prefer the least-filled round
  // where neither player already appears; falls back to the least-filled round
  // overall when that's impossible (only happens if numRounds < minimum rounds needed).
  function distributeMatches(matches, numRounds){
    const buckets = Array.from({ length: numRounds }, () => ({ matches: [], used: new Set() }));
    matches.forEach(([a, b]) => {
      let candidates = buckets
        .map((bkt, idx) => ({ idx, bkt }))
        .filter(o => !o.bkt.used.has(a) && !o.bkt.used.has(b));
      if(candidates.length === 0){
        candidates = buckets.map((bkt, idx) => ({ idx, bkt }));
      }
      candidates.sort((x, y) => x.bkt.matches.length - y.bkt.matches.length || x.idx - y.idx);
      const chosen = candidates[0].bkt;
      chosen.matches.push([a, b]);
      chosen.used.add(a);
      chosen.used.add(b);
    });
    return buckets.map(b => b.matches);
  }

  function recommendedRounds(playerCount){
    return playerCount % 2 === 0 ? playerCount - 1 : playerCount;
  }

  function totalMatchesFor(playerCount){
    return playerCount * (playerCount - 1) / 2;
  }

  function generateFixtures(playerIds, numRounds){
    const rounds = circleMethod(playerIds);
    const flat = flattenInterleaved(rounds);
    const buckets = distributeMatches(flat, numRounds);
    const matches = [];
    buckets.forEach((bucketMatches, idx) => {
      bucketMatches.forEach(([a, b]) => {
        matches.push({ id: uid(), jornada: idx + 1, playerAId: a, playerBId: b, mapsA: null, mapsB: null });
      });
    });
    return matches;
  }

  // ---------- Swiss tournament ----------
  function swissConfigFor(n){
    let rounds, playoffSize;
    if(n <= 8){ rounds = 3; playoffSize = 4; }
    else if(n <= 16){ rounds = 4; playoffSize = 4; }
    else if(n <= 32){ rounds = 5; playoffSize = 8; }
    else if(n <= 64){ rounds = 6; playoffSize = 8; }
    else if(n <= 128){ rounds = 7; playoffSize = 8; }
    else { rounds = 8; playoffSize = 8; }
    while(playoffSize > n) playoffSize = playoffSize / 2;
    if(playoffSize < 2) playoffSize = Math.min(2, n);
    return { rounds, playoffSize };
  }

  function pairKey(a, b){ return [a, b].sort().join("__"); }

  function generateSwissRound1(players){
    const ids = players.map(p => p.id);
    for(let i = ids.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [ids[i], ids[j]] = [ids[j], ids[i]];
    }
    let byePlayerId = null;
    if(ids.length % 2 !== 0) byePlayerId = ids.pop();
    const matches = [];
    for(let i = 0; i < ids.length; i += 2){
      matches.push({ id: uid(), round: 1, playerAId: ids[i], playerBId: ids[i+1], isBye: false, mapsA: null, mapsB: null });
    }
    if(byePlayerId){
      matches.push({ id: uid(), round: 1, playerAId: byePlayerId, playerBId: null, isBye: true, mapsA: null, mapsB: null });
    }
    return matches;
  }

  function computeSwissStandings(t){
    const stats = {};
    t.players.forEach(p => {
      stats[p.id] = { player: p, Pts: 0, PJ: 0, W: 0, D: 0, L: 0, gamesWon: 0, gamesPlayed: 0, opponents: [], hasHadBye: false };
    });
    t.matches.forEach(m => {
      if(m.isBye){
        const s = stats[m.playerAId];
        if(s){ s.Pts += 3; s.PJ += 1; s.W += 1; s.hasHadBye = true; }
        return;
      }
      if(!isPlayed(m)) return;
      const a = stats[m.playerAId], b = stats[m.playerBId];
      if(!a || !b) return;
      a.PJ++; b.PJ++;
      a.gamesWon += m.mapsA; a.gamesPlayed += m.mapsA + m.mapsB;
      b.gamesWon += m.mapsB; b.gamesPlayed += m.mapsA + m.mapsB;
      a.opponents.push(m.playerBId); b.opponents.push(m.playerAId);
      if(m.mapsA > m.mapsB){ a.W++; a.Pts += 3; b.L++; }
      else if(m.mapsA < m.mapsB){ b.W++; b.Pts += 3; a.L++; }
      else { a.D++; b.D++; a.Pts += 1; b.Pts += 1; }
    });
    function matchWinPct(id){
      const s = stats[id];
      if(!s || s.PJ === 0) return 0;
      return s.W / s.PJ;
    }
    Object.values(stats).forEach(s => {
      if(s.opponents.length === 0){ s.OMW = 0; }
      else {
        const pcts = s.opponents.map(oid => Math.max(matchWinPct(oid), 1/3));
        s.OMW = pcts.reduce((a,b) => a+b, 0) / pcts.length;
      }
      s.GW = s.gamesPlayed > 0 ? s.gamesWon / s.gamesPlayed : 0;
    });
    const rows = Object.values(stats);
    rows.sort((x,y) => y.Pts - x.Pts || y.OMW - x.OMW || y.GW - x.GW || x.player.name.localeCompare(y.player.name));
    return rows;
  }

  // Global backtracking matcher: given players sorted by standings (best first),
  // finds a perfect pairing (plus at most one Bye if the count is odd) with zero
  // rematches. Tries closest-ranked opponents first, so pairings still favor same
  // or nearest score group; backtracks through earlier pairings whenever a later
  // player would otherwise be stuck, which a simple greedy pass cannot do.
  function solveRoundPairing(order, playedSet, hasHadByeMap){
    const n = order.length;
    const used = new Array(n).fill(false);
    const pairs = [];

    function tryMatch(startIdx){
      let i = startIdx;
      while(i < n && used[i]) i++;
      if(i === n) return true;
      used[i] = true;
      for(let j = i + 1; j < n; j++){
        if(used[j]) continue;
        if(playedSet.has(pairKey(order[i], order[j]))) continue;
        used[j] = true;
        pairs.push([i, j]);
        if(tryMatch(i + 1)) return true;
        pairs.pop();
        used[j] = false;
      }
      used[i] = false;
      return false;
    }

    if(n % 2 === 0){
      if(tryMatch(0)) return { pairs, byeIdx: -1 };
      return null;
    }
    // Odd count: try giving the Bye to the lowest-ranked player first (per the
    // downpair rule), moving up only if that choice can't yield a full pairing
    // or that player already had a Bye this tournament.
    for(let i = n - 1; i >= 0; i--){
      if(hasHadByeMap[order[i]]) continue;
      used[i] = true;
      if(tryMatch(0)) return { pairs, byeIdx: i };
      used[i] = false;
    }
    // Fallback (should not happen at realistic tournament sizes): force the
    // lowest-ranked player to sit out even if they already had a Bye.
    used[n - 1] = true;
    if(tryMatch(0)) return { pairs, byeIdx: n - 1 };
    return null;
  }

  function generateNextSwissRound(t){
    const roundNum = t.currentRound + 1;
    const standings = computeSwissStandings(t);
    const order = standings.map(s => s.player.id);
    const hasHadByeMap = {}; standings.forEach(s => hasHadByeMap[s.player.id] = s.hasHadBye);
    const playedSet = new Set();
    t.matches.forEach(m => { if(!m.isBye) playedSet.add(pairKey(m.playerAId, m.playerBId)); });

    const solution = solveRoundPairing(order, playedSet, hasHadByeMap);
    if(!solution){
      showToast("No se pudo generar la ronda sin repetir enfrentamientos.");
      return;
    }

    const newMatches = solution.pairs.map(([i,j]) => ({
      id: uid(), round: roundNum, playerAId: order[i], playerBId: order[j], isBye: false, mapsA: null, mapsB: null
    }));
    if(solution.byeIdx !== -1){
      newMatches.push({ id: uid(), round: roundNum, playerAId: order[solution.byeIdx], playerBId: null, isBye: true, mapsA: null, mapsB: null });
    }
    t.matches.push(...newMatches);
    t.currentRound = roundNum;
  }

  // ---------- Playoffs ----------
  function matchWinnerId(m){
    if(m.mapsA === null || m.mapsA === undefined || m.mapsB === null || m.mapsB === undefined) return null;
    if(m.mapsA > m.mapsB) return m.playerAId;
    if(m.mapsB > m.mapsA) return m.playerBId;
    return null;
  }

  function generatePlayoffBracket(t){
    const standings = computeSwissStandings(t);
    const size = t.playoffSize;
    const seeds = standings.slice(0, size).map(s => s.player.id);
    let firstRoundPairs;
    if(size === 4) firstRoundPairs = [[0,3],[1,2]];
    else if(size === 8) firstRoundPairs = [[0,7],[3,4],[1,6],[2,5]];
    else {
      firstRoundPairs = [];
      for(let i = 0; i < size/2; i++) firstRoundPairs.push([i, size-1-i]);
    }
    const round0 = firstRoundPairs.map(([ia,ib]) => ({
      id: uid(), playerAId: seeds[ia], playerBId: seeds[ib], mapsA: null, mapsB: null, sourceAId: null, sourceBId: null
    }));
    const rounds = [round0];
    let prev = round0;
    while(prev.length > 1){
      const next = [];
      for(let i = 0; i < prev.length; i += 2){
        next.push({ id: uid(), playerAId: null, playerBId: null, mapsA: null, mapsB: null, sourceAId: prev[i].id, sourceBId: prev[i+1].id });
      }
      rounds.push(next);
      prev = next;
    }
    t.playoffs = { size, rounds };
  }

  function findPlayoffMatch(t, id){
    for(const round of t.playoffs.rounds){
      const m = round.find(x => x.id === id);
      if(m) return m;
    }
    return null;
  }

  function propagatePlayoffResults(t){
    const rounds = t.playoffs.rounds;
    for(let r = 1; r < rounds.length; r++){
      rounds[r].forEach(m => {
        if(m.sourceAId){
          const src = findPlayoffMatch(t, m.sourceAId);
          m.playerAId = (src && matchWinnerId(src)) || null;
        }
        if(m.sourceBId){
          const src = findPlayoffMatch(t, m.sourceBId);
          m.playerBId = (src && matchWinnerId(src)) || null;
        }
      });
    }
  }

  function tournamentChampion(t){
    if(!playoffsOn(t)){
      if(!isFinished(t)) return null;
      const standings = computeSwissStandings(t);
      return standings.length ? standings[0].player.name : null;
    }
    if(!t.playoffs) return null;
    const rounds = t.playoffs.rounds;
    const finalRound = rounds[rounds.length - 1];
    if(!finalRound || finalRound.length !== 1) return null;
    const m = finalRound[0];
    if(!isPlayed(m)) return null;
    const wid = matchWinnerId(m);
    if(!wid) return null;
    const p = t.players.find(p => p.id === wid);
    return p ? p.name : null;
  }

  function roundLabel(idx, totalRounds){
    const fromEnd = totalRounds - idx;
    if(fromEnd === 1) return "Final";
    if(fromEnd === 2) return "Semifinal";
    if(fromEnd === 3) return "Cuartos de final";
    return `Ronda ${idx+1}`;
  }

  // ---------- Standings calculation ----------
  function computeStandings(league){
    const stats = {};
    league.players.forEach(p => {
      stats[p.id] = { player:p, PJ:0, G:0, E:0, P:0, MF:0, MC:0, DM:0, Pts:0 };
    });
    league.matches.forEach(m => {
      if(!isPlayed(m)) return;
      const a = stats[m.playerAId], b = stats[m.playerBId];
      if(!a || !b) return;
      a.PJ++; b.PJ++;
      a.MF += m.mapsA; a.MC += m.mapsB;
      b.MF += m.mapsB; b.MC += m.mapsA;
      if(m.mapsA > m.mapsB){ a.G++; b.P++; a.Pts += 3; }
      else if(m.mapsA < m.mapsB){ b.G++; a.P++; b.Pts += 3; }
      else { a.E++; b.E++; a.Pts += 1; b.Pts += 1; }
    });
    const rows = Object.values(stats).map(r => ({...r, DM: r.MF - r.MC}));
    rows.sort((x,y) => {
      if(y.Pts !== x.Pts) return y.Pts - x.Pts;
      if(y.DM !== x.DM) return y.DM - x.DM;
      if(y.MF !== x.MF) return y.MF - x.MF;
      return x.player.name.localeCompare(y.player.name);
    });
    return rows;
  }

  function matchResultBadge(m, league){
    if(m.mapsA > m.mapsB) return `<span class="badge vl">${escapeHtml(playerName(league,m.playerAId))} gana</span>`;
    if(m.mapsA < m.mapsB) return `<span class="badge vv">${escapeHtml(playerName(league,m.playerBId))} gana</span>`;
    return `<span class="badge e">Empate</span>`;
  }

  function playerName(league, id){
    const p = league.players.find(p => p.id === id);
    return p ? p.name : "?";
  }

  // ---------- Rendering ----------
  const app = document.getElementById("app");

  function render(){
    if(state.wizard){
      app.innerHTML = renderWizard();
      bindWizardEvents();
      return;
    }
    const league = getActiveLeague();
    if(!league){
      app.innerHTML = renderHome();
      bindHomeEvents();
    } else if(league.type === "tournament"){
      app.innerHTML = renderTournamentView(league);
      bindTournamentEvents(league);
    } else {
      app.innerHTML = renderLeague(league);
      bindLeagueEvents(league);
    }
  }

  function openWizard(type){
    state.wizard = { step: 1, type, name: "", players: [], numRounds: null };
    render();
  }

  function renderCompetitionCard(c){
    const finished = isFinished(c);
    const isT = c.type === "tournament";
    let progress;
    if(isT){
      const champ = tournamentChampion(c);
      if(champ) progress = `Campeón: ${escapeHtml(champ)}`;
      else if(c.playoffs) progress = "Playoffs en curso";
      else progress = `Ronda ${c.currentRound}/${c.swissRounds}`;
    } else {
      const played = c.matches.filter(isPlayed).length;
      progress = `${played}/${c.matches.length} partidos jugados`;
    }
    const created = formatDate(c.createdAt);
    return `
      <div class="league-card" data-id="${c.id}">
        <div class="name">${escapeHtml(c.name)}</div>
        <div class="card-badges">
          <span class="status-badge ${finished?"finished":"active"}">${finished?"Finalizada":"Activa"}</span>
        </div>
        <div class="meta">${c.players.length} jugadores &middot; ${progress}</div>
        ${created ? `<div class="meta">Creada el ${created}</div>` : ""}
        <div class="row">
          <button class="btn btn-accent open-league" data-id="${c.id}">Abrir</button>
          <button class="btn btn-ghost btn-sm delete-league" data-id="${c.id}" title="Eliminar">Eliminar</button>
        </div>
      </div>
    `;
  }

  function renderCompetitionSection(title, type, items, filter, newBtnId, newBtnLabel){
    const filtered = items.filter(c => {
      if(filter === "active") return !isFinished(c);
      if(filter === "finished") return isFinished(c);
      return true;
    });
    const emptyLabel = filter === "active" ? "activas" : filter === "finished" ? "finalizadas" : "";
    const cards = filtered.map(renderCompetitionCard).join("")
      || `<div class="empty-state" style="grid-column:1/-1;">No hay ${title.toLowerCase()} ${emptyLabel} todavía.</div>`;

    return `
      <section class="comp-section">
        <div class="section-header">
          <h2>${title}</h2>
          <div class="section-header-actions">
            <div class="filter-pills" data-section="${type}">
              <button class="filter-pill ${filter==='all'?'active':''}" data-filter="all">Todas</button>
              <button class="filter-pill ${filter==='active'?'active':''}" data-filter="active">Activas</button>
              <button class="filter-pill ${filter==='finished'?'active':''}" data-filter="finished">Finalizadas</button>
            </div>
            <button class="btn btn-accent btn-sm" id="${newBtnId}">${newBtnLabel}</button>
          </div>
        </div>
        <div class="league-grid">${cards}</div>
      </section>
    `;
  }

  // Hierarchical view definitions match the source layout logic
  function renderHome(){
    const all = state.data.leagues;
    const leagues = all.filter(c => c.type !== "tournament");
    const tournaments = all.filter(c => c.type === "tournament");

    return `
      <div class="app-header">
        <h1>Liga<span>Tracker</span></h1>
        <div class="sub">${all.length} competición${all.length===1?"":"es"} guardada${all.length===1?"":"s"}</div>
      </div>
      ${renderCompetitionSection("Ligas", "league", leagues, state.homeFilters.league, "new-league-btn", "+ Nueva liga")}
      ${renderCompetitionSection("Torneos", "tournament", tournaments, state.homeFilters.tournament, "new-tournament-btn", "+ Nuevo torneo")}
      <div class="toolbar">
        <button class="btn btn-sm" id="import-btn">Importar JSON</button>
        <input type="file" id="import-file" accept="application/json">
      </div>
    `;
  }

  function bindHomeEvents(){
    document.getElementById("new-league-btn").addEventListener("click", () => openWizard("league"));
    document.getElementById("new-tournament-btn").addEventListener("click", () => openWizard("tournament"));
    document.querySelectorAll(".filter-pill").forEach(btn => {
      btn.addEventListener("click", () => {
        const section = btn.closest(".filter-pills").dataset.section;
        state.homeFilters[section] = btn.dataset.filter;
        render();
      });
    });
    document.querySelectorAll(".open-league").forEach(btn => {
      btn.addEventListener("click", () => {
        state.data.activeLeagueId = btn.dataset.id;
        state.activeTab = "jugadores";
        saveData();
        render();
      });
    });
    document.querySelectorAll(".delete-league").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        const league = state.data.leagues.find(l => l.id === btn.dataset.id);
        if(!league) return;
        if(!confirm(`¿Eliminar "${league.name}"? Esta acción no se puede deshacer.`)) return;
        state.data.leagues = state.data.leagues.filter(l => l.id !== btn.dataset.id);
        saveData();
        render();
      });
    });
    const importBtn = document.getElementById("import-btn");
    const importFile = document.getElementById("import-file");
    importBtn.addEventListener("click", () => importFile.click());
    importFile.addEventListener("change", handleImport);
  }

  function handleImport(e){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const parsed = JSON.parse(reader.result);
        const incoming = Array.isArray(parsed.leagues) ? parsed.leagues : (parsed.id ? [parsed] : null);
        if(!incoming) throw new Error("Formato no reconocido");
        incoming.forEach(l => {
          l.id = uid(); // avoid collisions
          state.data.leagues.push(l);
        });
        saveData();
        render();
        showToast(`Importada${incoming.length===1?"":"s"} ${incoming.length} liga${incoming.length===1?"":"s"}`);
      }catch(err){
        alert("No se pudo importar el archivo: " + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  // ---------- New league wizard ----------
  function renderWizard(){
    const w = state.wizard;
    let inner;
    if(w.step === 1) inner = wizardStepName(w);
    else if(w.step === 2) inner = wizardStepPlayers(w);
    else inner = wizardStepSettings(w);
    return `
      <div class="modal-overlay" id="wizard-overlay">

      <p class="hint">La ronda 1 se emparejará aleatoriamente. A partir de ahí, cada ronda se genera según la clasificación (puntos, OMW%, GW%), sin repetir enfrentamientos.</p>

  function bindWizardEvents(){
    const w = state.wizard;
    const overlay = document.getElementById("wizard-overlay");
    overlay.addEventListener("click", (e) => {
      if(e.target === overlay){ state.wizard = null; render(); }
    });

    const step1 = document.getElementById("wizard-step1");
    if(step1){
      document.getElementById("wizard-cancel").addEventListener("click", () => { state.wizard = null; render(); });
      step1.addEventListener("submit", (e) => {
        e.preventDefault();
        const val = document.getElementById("wizard-name").value.trim();
        if(!val){ alert("Ponle un nombre."); return; }
        w.name = val;
        w.step = 2;
        render();
      });
    }

    const addPlayerForm = document.getElementById("wizard-add-player");
    if(addPlayerForm){
      addPlayerForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const input = document.getElementById("wizard-player-name");
        const name = input.value.trim();
        if(!name) return;
        w.players.push({ id: uid(), name });
        render();
      });
      document.querySelectorAll(".remove-wizard-player").forEach(btn => {
        btn.addEventListener("click", () => {
          w.players = w.players.filter(p => p.id !== btn.dataset.id);
          render();
        });
      });
      document.getElementById("wizard-back").addEventListener("click", () => { w.step = 1; render(); });
      document.getElementById("wizard-next-2").addEventListener("click", () => {
        if(w.players.length < 2){ alert("Añade al menos 2 jugadores."); return; }
        w.step = 3;
        render();
      });
    }

    const genBtn = document.getElementById("wizard-generate");
    if(genBtn){
      document.getElementById("wizard-back2").addEventListener("click", () => { w.step = 2; render(); });
      genBtn.addEventListener("click", () => {
        const n = w.players.length;
        if(w.type === "tournament"){
          const cfg = swissConfigFor(n);
          const playoffsRadio = document.querySelector('input[name="wizard-playoffs"]:checked');
          const playoffsEnabled = !playoffsRadio || playoffsRadio.value === "on";
          const matches = generateSwissRound1(w.players);
          const comp = {
            id: uid(), type: "tournament", name: w.name, createdAt: Date.now(), status: "active",
            players: w.players, swissRounds: cfg.rounds, playoffSize: cfg.playoffSize, playoffsEnabled,
            currentRound: 1, matches, playoffs: null
          };
          state.data.leagues.push(comp);
          state.data.activeLeagueId = comp.id;
          state.activeTab = "rondas";
          state.wizard = null;
          saveData();
          render();
          showToast(playoffsEnabled ? `Torneo creado: ${cfg.rounds} rondas suizas + playoffs a ${cfg.playoffSize}` : `Torneo creado: ${cfg.rounds} rondas suizas (sin playoffs)`);
        } else {
          const total = totalMatchesFor(n);
          let numRounds = parseInt(document.getElementById("wizard-rounds").value, 10);
          if(!numRounds || numRounds < 1) numRounds = recommendedRounds(n);
          if(numRounds > total) numRounds = total;
          const playerIds = w.players.map(p => p.id);
          const matches = generateFixtures(playerIds, numRounds);
          const league = { id: uid(), type: "league", name: w.name, createdAt: Date.now(), status: "active", players: w.players, matches };
          state.data.leagues.push(league);
          state.data.activeLeagueId = league.id;
          state.activeTab = "partidos";
          state.wizard = null;
          saveData();
          render();
          showToast(`Liga creada: ${total} partidos en ${numRounds} jornadas`);
        }
      });
    }
  }

  function renderMatchRow(m, league, readOnly){
    const played = isPlayed(m);
    if(readOnly){
      return `
        <div class="match-row">
          <div class="pname">${escapeHtml(playerName(league,m.playerAId))}</div>
          <div class="score-display">${played ? m.mapsA : "-"}</div>
          <div class="dash">&ndash;</div>
          <div class="score-display">${played ? m.mapsB : "-"}</div>
          <div class="pname away">${escapeHtml(playerName(league,m.playerBId))}</div>
          ${played ? matchResultBadge(m, league) : `<span class="badge pending">Pendiente</span>`}
          <div class="match-actions"></div>
        </div>
      `;
    }
    return `
      <form class="match-row" data-id="${m.id}">
        <div class="pname">${escapeHtml(playerName(league,m.playerAId))}</div>
        <input type="number" class="score-input" name="mapsA" min="0" placeholder="-" value="${played ? m.mapsA : ""}">
        <div class="dash">&ndash;</div>
        <input type="number" class="score-input" name="mapsB" min="0" placeholder="-" value="${played ? m.mapsB : ""}">
        <div class="pname away">${escapeHtml(playerName(league,m.playerBId))}</div>
        ${played ? matchResultBadge(m, league) : `<span class="badge pending">Pendiente</span>`}
        <div class="match-actions">
          <button type="submit" class="btn btn-accent btn-sm">${played ? "Actualizar" : "Guardar"}</button>
          <button type="button" class="btn btn-ghost btn-sm delete-match" data-id="${m.id}">Eliminar</button>
        </div>
      </form>
    `;
  }

  function renderMatchesTab(league){
    if(league.players.length < 2){
      return `<div class="empty-state"><div class="big">Añade al menos 2 jugadores</div>Ve a la pestaña Jugadores para empezar.</div>`;
    }
    const finished = isFinished(league);
    const options = league.players.map(p => `<option value="${p.id}">${escapeHtml(p.name)}</option>`).join("");
    const maxJornada = league.matches.reduce((m, x) => Math.max(m, x.jornada || 1), 0);
    const playedCount = league.matches.filter(isPlayed).length;

    const groups = {};
    league.matches.forEach(m => {
      (groups[m.jornada] = groups[m.jornada] || []).push(m);
    });
    const jornadaKeys = Object.keys(groups).map(Number).sort((a,b)=>a-b);

    const matchesHtml = jornadaKeys.map(j => `
      <div class="jornada-group">
        <div class="jornada-label">Jornada ${j}</div>
        ${groups[j].map(m => renderMatchRow(m, league, finished)).join("")}
      </div>
    `).join("") || `<div class="hint">Todavía no hay partidos programados. Usa "Regenerar calendario" o añade partidos manualmente.</div>`;

    return `
      <div class="panel">
        <div class="matches-toolbar">
          <h3 style="margin:0;">Calendario</h3>
          <div class="matches-toolbar-actions">
            <span class="hint" style="margin:0;">${playedCount}/${league.matches.length} jugados</span>
            ${finished ? "" : `
              <button class="btn btn-sm" id="regen-schedule-btn">Regenerar calendario</button>
              <button class="btn btn-sm" id="toggle-manual-form">${state.manualFormOpen ? "Ocultar formulario" : "+ Partido manual"}</button>
            `}
          </div>
        </div>
        ${(!finished && state.manualFormOpen) ? `
          <form id="add-match-form" class="form-row" style="margin-top:16px;">
            <div class="field">
              <label for="m-jornada">Jornada</label>
              <input type="number" id="m-jornada" min="1" value="${maxJornada + 1 || 1}" required>
            </div>
            <div class="field">
              <label for="m-playerA">Jugador local</label>
              <select id="m-playerA" required>${options}</select>
            </div>
            <div class="field">
              <label for="m-mapsA">Mapas</label>
              <input type="number" id="m-mapsA" min="0" value="0" required>
            </div>
            <div class="field">
              <label for="m-mapsB">Mapas</label>
              <input type="number" id="m-mapsB" min="0" value="0" required>
            </div>
            <div class="field">
              <label for="m-playerB">Jugador visitante</label>
              <select id="m-playerB" required>${options}</select>
            </div>
            <button class="btn btn-accent" type="submit">Añadir partido</button>
          </form>
        ` : ""}
      </div>
      <div class="panel">
        ${matchesHtml}
      </div>
    `;
  }

  function renderStandingsTab(league){
    if(league.players.length === 0){
      return `<div class="empty-state"><div class="big">Sin jugadores todavía</div>La clasificación aparecerá aquí cuando añadas jugadores y partidos.</div>`;
    }
    const rows = computeStandings(league);
    const body = rows.map((r, i) => {
      const pos = i+1;
      const posClass = pos===1?"pos-1":pos===2?"pos-2":pos===3?"pos-3":"";
      return `
        <tr>
          <td>${posClass ? `<span class="pos-badge ${posClass}">${pos}</span>` : pos}</td>
          <td>${escapeHtml(r.player.name)}</td>
          <td>${r.PJ}</td>
          <td>${r.G}</td>
          <td>${r.E}</td>
          <td>${r.P}</td>
          <td>${r.MF}</td>
          <td>${r.MC}</td>
          <td>${r.DM > 0 ? "+"+r.DM : r.DM}</td>
          <td>${r.Pts}</td>
        </tr>
      `;
    }).join("");

    return `
      <div class="panel">
        <table class="standings">
          <thead>
            <tr>
              <th>Pos</th><th>Jugador</th><th>PJ</th><th>G</th><th>E</th><th>P</th>
              <th>MF</th><th>MC</th><th>DM</th><th>Pts</th>
            </tr>
          </thead>
          <tbody>${body}</tbody>
        </table>
        <div class="hint">Desempate: Puntos &rarr; Diferencia de mapas (DM) &rarr; Mapas a favor (MF)</div>
      </div>
    `;
  }

  function bindLeagueEvents(league){
    document.getElementById("back-btn").addEventListener("click", () => {
      state.data.activeLeagueId = null;
      saveData();
      render();
    });
    const renameBtn = document.getElementById("rename-btn");
    if(renameBtn){
      renameBtn.addEventListener("click", () => {
        const name = prompt("Nuevo nombre de la liga:", league.name);
        if(!name) return;
        league.name = name.trim();
        saveData();
        render();
      });
    }
    document.getElementById("export-btn").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify({ leagues: [league] }, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${league.name.replace(/[^a-z0-9]+/gi,"_")}.json`;
      a.click();
      URL.revokeObjectURL(url);
    });
    const finishBtn = document.getElementById("finish-btn");
    if(finishBtn){
      finishBtn.addEventListener("click", () => {
        if(!confirm(`¿Finalizar la liga "${league.name}"? La clasificación actual quedará como definitiva y ya no podrás editar jugadores, partidos ni ajustes. Esta acción no se puede deshacer.`)) return;
        league.status = "finished";
        league.finishedAt = Date.now();
        saveData();
        render();
        showToast("Liga finalizada");
      });
    }

    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        state.activeTab = tab.dataset.tab;
        render();
      });
    });

    const addPlayerForm = document.getElementById("add-player-form");
    if(addPlayerForm){
      addPlayerForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const input = document.getElementById("player-name");
        const name = input.value.trim();
        if(!name) return;
        league.players.push({ id: uid(), name });
        saveData();
        render();
      });
      document.querySelectorAll(".remove-player").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = btn.dataset.id;
          const usedInMatch = league.matches.some(m => m.playerAId === id || m.playerBId === id);
          if(usedInMatch && !confirm("Este jugador tiene partidos registrados. ¿Eliminarlo y sus partidos asociados?")) return;
          league.players = league.players.filter(p => p.id !== id);
          if(usedInMatch){
            league.matches = league.matches.filter(m => m.playerAId !== id && m.playerBId !== id);
          }
          saveData();
          render();
        });
      });
    }

    const addMatchForm = document.getElementById("add-match-form");
    if(addMatchForm){
      addMatchForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const jornada = parseInt(document.getElementById("m-jornada").value, 10) || 1;
        const playerAId = document.getElementById("m-playerA").value;
        const playerBId = document.getElementById("m-playerB").value;
        const mapsA = parseInt(document.getElementById("m-mapsA").value, 10) || 0;
        const mapsB = parseInt(document.getElementById("m-mapsB").value, 10) || 0;
        if(playerAId === playerBId){
          alert("El jugador local y el visitante deben ser distintos.");
          return;
        }
        league.matches.push({ id: uid(), jornada, playerAId, mapsA, playerBId, mapsB });
        saveData();
        render();
      });
    }

    const toggleManualBtn = document.getElementById("toggle-manual-form");
    if(toggleManualBtn){
      toggleManualBtn.addEventListener("click", () => {
        state.manualFormOpen = !state.manualFormOpen;
        render();
      });
    }

    const regenBtn = document.getElementById("regen-schedule-btn");
    if(regenBtn){
      regenBtn.addEventListener("click", () => {
        if(league.players.length < 2){ alert("Necesitas al menos 2 jugadores."); return; }
        const total = totalMatchesFor(league.players.length);
        const rec = recommendedRounds(league.players.length);
        const input = prompt(`¿En cuántas jornadas quieres repartir los ${total} partidos? (recomendado: ${rec})`, rec);
        if(input === null) return;
        let numRounds = parseInt(input, 10);
        if(!numRounds || numRounds < 1) numRounds = rec;
        if(numRounds > total) numRounds = total;
        if(!confirm("Esto borrará todos los partidos y resultados actuales de esta liga y generará un calendario nuevo. ¿Continuar?")) return;
        const playerIds = league.players.map(p => p.id);
        league.matches = generateFixtures(playerIds, numRounds);
        saveData();
        render();
        showToast("Calendario regenerado");
      });
    }

    document.querySelectorAll(".match-row").forEach(form => {
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const id = form.dataset.id;
        const match = league.matches.find(m => m.id === id);
        if(!match) return;
        const aVal = form.querySelector('[name="mapsA"]').value;
        const bVal = form.querySelector('[name="mapsB"]').value;
        if(aVal === "" || bVal === ""){
          alert("Introduce el resultado de ambos jugadores.");
          return;
        }
        match.mapsA = parseInt(aVal, 10) || 0;
        match.mapsB = parseInt(bVal, 10) || 0;
        saveData();
        render();
      });
    });
    document.querySelectorAll(".delete-match").forEach(btn => {
      btn.addEventListener("click", () => {
        league.matches = league.matches.filter(m => m.id !== btn.dataset.id);
        saveData();
        render();
      });
    });
  }

  function renderTournamentView(t){

    if(!finished){
      const onLastRound = t.currentRound === t.swissRounds;
      const lastRoundComplete = onLastRound && t.matches.filter(m => m.round === t.currentRound).every(isPlayed);
      const eligible = playoffsOn(t)
        ? (!!t.playoffs && !!tournamentChampion(t))
        : lastRoundComplete;
      const title = playoffsOn(t)
        ? "Completa la fase suiza y los playoffs para poder finalizar el torneo."
        : "Completa todas las rondas suizas para poder finalizar el torneo.";
      finishBtnHtml = eligible
        ? `<button class="btn btn-sm" id="finish-btn" style="color:var(--loss);">Finalizar torneo</button>`
        : `<button class="btn btn-sm" id="finish-btn" disabled title="${title}">Finalizar torneo</button>`;
    }
    return `
      <div class="league-topbar">
        <button class="btn btn-sm" id="back-btn">&larr; Competiciones</button>
        <h2>${escapeHtml(t.name)}</h2>
        <span class="type-badge">Torneo</span>
        <span class="status-badge ${finished?"finished":"active"}">${finished?"Finalizada":"Activa"}</span>
        <div class="spacer"></div>
        ${!finished ? `<button class="btn btn-sm" id="rename-btn">Renombrar</button>` : ""}
        <button class="btn btn-sm" id="export-btn">Exportar</button>
        ${finishBtnHtml}
      </div>
      <div class="tabs">
        <button class="tab ${state.activeTab==='jugadores'?'active':''}" data-tab="jugadores">Jugadores</button>
        <button class="tab ${state.activeTab==='rondas'?'active':''}" data-tab="rondas">Rondas Suizas</button>
        <button class="tab ${state.activeTab==='clasificacion'?'active':''}" data-tab="clasificacion">Clasificación</button>
        ${playoffsOn(t) ? `<button class="tab ${state.activeTab==='playoffs'?'active':''}" data-tab="playoffs">Playoffs</button>` : ""}
      </div>
      <div id="tab-content">
        ${state.activeTab==='jugadores' ? renderTournamentPlayersTab(t) : ""}
        ${state.activeTab==='rondas' ? renderSwissRoundsTab(t) : ""}
        ${state.activeTab==='clasificacion' ? renderSwissStandingsTab(t) : ""}
        ${(state.activeTab==='playoffs' && playoffsOn(t)) ? renderPlayoffsTab(t) : ""}
      </div>
    `;
  }

  function renderTournamentPlayersTab(t){
    const chips = t.players.map(p => `<div class="player-chip">${escapeHtml(p.name)}</div>`).join("");
    return `
      <div class="panel">
        <h3>Jugadores inscritos</h3>
        <div class="player-list">${chips}</div>
        <p class="hint">La lista de jugadores queda fija una vez creado el torneo, ya que los emparejamientos suizos dependen de ella.</p>
      </div>
    `;
  }

  function renderSwissMatchRow(m, t, readOnly){
    if(m.isBye){
      return `
        <div class="bye-row">
          <div class="pname">${escapeHtml(playerName(t, m.playerAId))}</div>
          <span class="badge bye">BYE &middot; 3 pts</span>
        </div>
      `;
    }
    const played = isPlayed(m);
    if(readOnly){
      return `
        <div class="match-row">
          <div class="pname">${escapeHtml(playerName(t,m.playerAId))}</div>
          <div class="score-display">${played ? m.mapsA : "-"}</div>
          <div class="dash">&ndash;</div>
          <div class="score-display">${played ? m.mapsB : "-"}</div>
          <div class="pname away">${escapeHtml(playerName(t,m.playerBId))}</div>
          ${played ? matchResultBadge(m, t) : `<span class="badge pending">Pendiente</span>`}
          <div class="match-actions"></div>
        </div>
      `;
    }
    return `
      <form class="match-row swiss-match-row" data-id="${m.id}">
        <div class="pname">${escapeHtml(playerName(t,m.playerAId))}</div>
        <input type="number" class="score-input" name="mapsA" min="0" placeholder="-" value="${played ? m.mapsA : ""}">
        <div class="dash">&ndash;</div>
        <input type="number" class="score-input" name="mapsB" min="0" placeholder="-" value="${played ? m.mapsB : ""}">
        <div class="pname away">${escapeHtml(playerName(t,m.playerBId))}</div>
        ${played ? matchResultBadge(m, t) : `<span class="badge pending">Pendiente</span>`}
        <div class="match-actions">
          <button type="submit" class="btn btn-accent btn-sm">${played ? "Actualizar" : "Guardar"}</button>
        </div>
      </form>
    `;
  }

  function renderSwissRoundsTab(t){
    const finished = isFinished(t);
    const groups = {};
    t.matches.forEach(m => { (groups[m.round] = groups[m.round] || []).push(m); });
    const roundKeys = Object.keys(groups).map(Number).sort((a,b)=>a-b);

    const html = roundKeys.map(r => {
      const complete = groups[r].every(isPlayed);
      return `
        <div class="jornada-group">
          <div class="jornada-label">Ronda ${r} ${complete ? '<span class="badge vl" style="margin-left:8px;">Completa</span>' : ""}</div>
          ${groups[r].map(m => renderSwissMatchRow(m, t, finished)).join("")}
        </div>
      `;
    }).join("");

    let actionHtml = "";
    if(!finished){
      const lastRound = roundKeys.length ? Math.max(...roundKeys) : 0;
      const lastComplete = lastRound > 0 && groups[lastRound].every(isPlayed);
      if(lastComplete && lastRound < t.swissRounds){
        actionHtml = `<button class="btn btn-accent" id="gen-next-round-btn">Generar Ronda ${lastRound+1}</button>`;
      } else if(lastComplete && lastRound === t.swissRounds){
        if(!playoffsOn(t)){
          actionHtml = `<div class="hint">Fase suiza completada. Pulsa "Finalizar torneo" arriba para cerrar el torneo: el 1º de la clasificación será el campeón.</div>`;
        } else {
          actionHtml = t.playoffs
            ? `<div class="hint">Fase suiza completada. Consulta la pestaña Playoffs.</div>`
            : `<button class="btn btn-accent" id="gen-playoffs-btn">Generar Playoffs</button>`;
        }
      } else if(!lastComplete){
        actionHtml = `<div class="hint">Completa todos los partidos de la ronda ${lastRound} para generar la siguiente.</div>`;
      }
    }

    return `
      <div class="panel">
        <div class="matches-toolbar">
          <h3 style="margin:0;">Fase suiza &middot; Ronda ${t.currentRound} de ${t.swissRounds}</h3>
        </div>
        <div style="margin-top:14px;">${actionHtml}</div>
      </div>
      <div class="panel">${html}</div>
    `;
  }

  function renderSwissStandingsTab(t){
    if(t.players.length === 0){
      return `<div class="empty-state"><div class="big">Sin jugadores todavía</div></div>`;
    }
    const rows = computeSwissStandings(t);
    const body = rows.map((r,i) => {
      const pos = i+1;
      const posClass = pos===1?"pos-1":pos===2?"pos-2":pos===3?"pos-3":"";
      return `
        <tr>
          <td>${posClass ? `<span class="pos-badge ${posClass}">${pos}</span>` : pos}</td>
          <td>${escapeHtml(r.player.name)}</td>
          <td>${r.PJ}</td>
          <td>${r.Pts}</td>
          <td>${(r.OMW*100).toFixed(1)}%</td>
          <td>${(r.GW*100).toFixed(1)}%</td>
        </tr>
      `;
    }).join("");

    return `
      <div class="panel">
        <table class="standings">
          <thead>
            <tr><th>Pos</th><th>Jugador</th><th>PJ</th><th>Pts</th><th>OMW%</th><th>GW%</th></tr>
          </thead>
          <tbody>${body}</tbody>
        </table>
        <div class="hint">Desempate: Puntos &rarr; % de victorias de los rivales (OMW%) &rarr; % de partidas ganadas (GW%)</div>
      </div>
    `;
  }

  function renderPlayoffMatch(m, t, readOnly){
    const aName = m.playerAId ? escapeHtml(playerName(t, m.playerAId)) : "Por determinar";
    const bName = m.playerBId ? escapeHtml(playerName(t, m.playerBId)) : "Por determinar";
    const canPlay = m.playerAId && m.playerBId;
    const winner = canPlay ? matchWinnerId(m) : null;
    const played = canPlay && isPlayed(m);
    const showForm = canPlay && !readOnly;
    return `
      <form class="playoff-match" data-id="${m.id}">
        <div class="po-row">
          <div class="po-player ${winner===m.playerAId?"winner":""}">${aName}</div>
          ${showForm ? `<input type="number" class="score-input" name="mapsA" min="0" placeholder="-" value="${played ? m.mapsA : ""}">` : `<span class="score-input placeholder">${canPlay && played ? m.mapsA : "-"}</span>`}
        </div>
        <div class="po-row">
          <div class="po-player ${winner===m.playerBId?"winner":""}">${bName}</div>
          ${showForm ? `<input type="number" class="score-input" name="mapsB" min="0" placeholder="-" value="${played ? m.mapsB : ""}">` : `<span class="score-input placeholder">${canPlay && played ? m.mapsB : "-"}</span>`}
        </div>
        ${showForm ? `<button type="submit" class="btn btn-accent btn-sm">${played ? "Actualizar" : "Guardar"}</button>` : ""}
      </form>
    `;
  }

  function renderPlayoffsTab(t){
    if(!playoffsOn(t)){
      return `<div class="empty-state"><div class="big">Sin playoffs</div>Este torneo solo usa fase suiza. El campeón es el 1º de la clasificación una vez finalizado.</div>`;
    }
    if(!t.playoffs){
      return `<div class="empty-state"><div class="big">Playoffs pendientes</div>Se generarán automáticamente al completar la fase suiza.</div>`;
    }
    const finished = isFinished(t);
    const champ = tournamentChampion(t);
    const totalRounds = t.playoffs.rounds.length;
    const columns = t.playoffs.rounds.map((round, idx) => `
      <div class="playoff-round">
        <div class="playoff-round-label">${roundLabel(idx, totalRounds)}</div>
        ${round.map(m => renderPlayoffMatch(m, t, finished)).join("")}
      </div>
    `).join("");

    return `
      ${champ ? `<div class="champion-banner">&#127942; Campeón: ${escapeHtml(champ)}</div>` : ""}
      <div class="panel">
        <div class="playoff-bracket">${columns}</div>
      </div>
    `;
  }

  function bindTournamentEvents(t){
    bindTopbarEvents(t);

    const genNextBtn = document.getElementById("gen-next-round-btn");
    if(genNextBtn){
      genNextBtn.addEventListener("click", () => {
        generateNextSwissRound(t);
        saveData();
        render();
        showToast(`Ronda ${t.currentRound} generada`);
      });
    }

    const genPlayoffsBtn = document.getElementById("gen-playoffs-btn");
    if(genPlayoffsBtn){
      genPlayoffsBtn.addEventListener("click", () => {
        generatePlayoffBracket(t);
        saveData();
        render();
        showToast("Playoffs generados");
      });
    }

    document.querySelectorAll(".swiss-match-row").forEach(form => {
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const id = form.dataset.id;
        const match = t.matches.find(m => m.id === id);
        if(!match) return;
        const aVal = form.querySelector('[name="mapsA"]').value;
        const bVal = form.querySelector('[name="mapsB"]').value;
        if(aVal === "" || bVal === ""){
          alert("Introduce el resultado de ambos jugadores.");
          return;
        }
        match.mapsA = parseInt(aVal, 10) || 0;
        match.mapsB = parseInt(bVal, 10) || 0;
        saveData();
        render();
      });
    });

    document.querySelectorAll(".playoff-match").forEach(form => {
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const id = form.dataset.id;
        const match = findPlayoffMatch(t, id);
        if(!match) return;
        const aInput = form.querySelector('[name="mapsA]');
        const bInput = form.querySelector('[name="mapsB]');
        if(!aInput || !bInput) return;
        const aVal = aInput.value, bVal = bInput.value;
        if(aVal === "" || bVal === ""){
          alert("Introduce el resultado de ambos jugadores.");
          return;
        }
        const mapsA = parseInt(aVal, 10) || 0;
        const mapsB = parseInt(bVal, 10) || 0;
        if(mapsA === mapsB){
          alert("Los playoffs no permiten empates: debe haber un ganador.");
          return;
        }
        match.mapsA = mapsA;
        match.mapsB = mapsB;
        propagatePlayoffResults(t);
        saveData();
        render();
      });
    });
  }

  render();
})();
</script>
</body>
</html>
