<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liga Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#12151a;
    --surface:#1a1f28;
    --surface-2:#212836;
    --border:#2b3341;
    --text:#eef1f6;
    --text-dim:#8b93a3;
    --accent:#e8a33d;
    --accent-dim:#4a3a1f;
    --win:#4caf7d;
    --draw:#7a8699;
    --loss:#e2626b;
    --gold:#e8c04a;
    --silver:#c7cddb;
    --bronze:#c98a53;
    --font-display:'Oswald', sans-serif;
    --font-body:'Inter', sans-serif;
    --font-mono:'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--accent);color:#12151a;}

  a,button,input,select{font-family:inherit;}
  button{cursor:pointer;}

  .app{max-width:920px;margin:0 auto;padding:28px 20px 80px;}

  /* Header */
  .app-header{
    display:flex;align-items:baseline;justify-content:space-between;
    margin-bottom:28px;flex-wrap:wrap;gap:10px;
  }
  .app-header h1{
    font-family:var(--font-display);
    font-weight:700;
    font-size:28px;
    letter-spacing:0.03em;
    margin:0;
    text-transform:uppercase;
  }
  .app-header h1 span{color:var(--accent);}
  .app-header .sub{color:var(--text-dim);font-size:13px;}

  .btn{
    border:1px solid var(--border);
    background:var(--surface-2);
    color:var(--text);
    border-radius:8px;
    padding:9px 16px;
    font-size:14px;
    font-weight:600;
    transition:border-color .15s, background .15s;
  }
  .btn:hover{border-color:var(--accent);}
  .btn-accent{
    background:var(--accent);
    color:#1a1206;
    border-color:var(--accent);
  }
  .btn-accent:hover{background:#f0af4d;}
  .btn-ghost{background:transparent;border-color:transparent;color:var(--text-dim);}
  .btn-ghost:hover{color:var(--loss);border-color:transparent;background:transparent;}
  .btn-sm{padding:6px 10px;font-size:12px;border-radius:6px;}
  .btn:focus-visible, input:focus-visible, select:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

  /* Home / league cards */
  .league-grid{
    display:grid;grid-template-columns:repeat(auto-fill, minmax(230px,1fr));
    gap:14px;
  }
  .league-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    padding:18px;
    display:flex;flex-direction:column;gap:10px;
    transition:border-color .15s, transform .15s;
  }
  .league-card:hover{border-color:var(--accent);}
  .league-card .name{font-family:var(--font-display);font-size:19px;font-weight:600;letter-spacing:.01em;}
  .league-card .meta{color:var(--text-dim);font-size:12.5px;font-family:var(--font-mono);}
  .league-card .row{display:flex;gap:8px;margin-top:auto;}
  .league-card .row .btn{flex:1;}

  .new-league-card{
    border:1.5px dashed var(--border);
    border-radius:12px;
    display:flex;align-items:center;justify-content:center;
    min-height:120px;
    color:var(--text-dim);
    font-weight:600;
    background:transparent;
    font-size:14px;
  }
  .new-league-card:hover{border-color:var(--accent);color:var(--accent);}

  .empty-state{
    text-align:center;padding:60px 20px;color:var(--text-dim);
    border:1px dashed var(--border);border-radius:12px;
  }
  .empty-state .big{font-family:var(--font-display);font-size:20px;color:var(--text);margin-bottom:6px;}

  /* League view */
  .league-topbar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
  .league-topbar h2{font-family:var(--font-display);font-size:24px;margin:0;text-transform:uppercase;letter-spacing:.02em;}
  .league-topbar .spacer{flex:1;}

  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:22px;}
  .tab{
    padding:10px 16px;font-weight:600;font-size:13.5px;color:var(--text-dim);
    border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;
    text-transform:uppercase;letter-spacing:.03em;
  }
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .tab:hover:not(.active){color:var(--text);}

  .panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;}
  .panel + .panel{margin-top:16px;}
  .panel h3{font-family:var(--font-display);font-size:14px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-dim);margin:0 0 14px;}

  /* Forms */
  .form-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
  .field{display:flex;flex-direction:column;gap:5px;}
  .field label{font-size:11.5px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.03em;font-weight:600;}
  input, select{
    background:var(--surface-2);
    border:1px solid var(--border);
    color:var(--text);
    border-radius:7px;
    padding:8px 10px;
    font-size:14px;
  }
  input[type=number]{width:80px;font-family:var(--font-mono);}
  input[type=text]{min-width:160px;}
  select{min-width:150px;}

  /* Players list */
  .player-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;}
  .player-chip{
    display:flex;align-items:center;gap:8px;
    background:var(--surface-2);border:1px solid var(--border);
    border-radius:20px;padding:6px 8px 6px 14px;font-size:13.5px;font-weight:500;
  }
  .player-chip button{
    background:none;border:none;color:var(--text-dim);width:20px;height:20px;
    border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;line-height:1;
  }
  .player-chip button:hover{background:var(--loss);color:#fff;}

  /* Matches */
  .jornada-group{margin-bottom:18px;}
  .jornada-label{
    font-family:var(--font-mono);font-size:11.5px;color:var(--accent);
    text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;font-weight:600;
  }
  .match-row{
    display:grid;
    grid-template-columns:1fr auto auto auto 1fr auto auto;
    align-items:center;gap:10px;
    padding:10px 12px;border:1px solid var(--border);border-radius:9px;
    background:var(--surface-2);margin-bottom:6px;font-size:14px;
  }
  .match-row .pname{font-weight:600;text-align:right;}
  .match-row .pname.away{text-align:left;}
  .match-row .score{font-family:var(--font-mono);font-weight:700;font-size:15px;background:var(--surface);
    border:1px solid var(--border);border-radius:6px;padding:3px 9px;min-width:26px;text-align:center;}
  .match-row .dash{color:var(--text-dim);}
  .badge{
    font-family:var(--font-mono);font-size:11px;font-weight:700;padding:3px 8px;border-radius:5px;
    text-transform:uppercase;letter-spacing:.04em;
  }
  .badge.vl{background:rgba(76,175,125,.15);color:var(--win);}
  .badge.vv{background:rgba(76,175,125,.15);color:var(--win);}
  .badge.e{background:rgba(122,134,153,.2);color:var(--draw);}
  .match-actions{display:flex;gap:4px;}

  @media (max-width:640px){
    .match-row{grid-template-columns:1fr;text-align:left;gap:6px;}
    .match-row .pname{text-align:left;}
    .match-row .badge, .match-actions{justify-self:start;}
  }

  /* Standings table */
  table.standings{width:100%;border-collapse:collapse;font-size:13.5px;}
  table.standings th{
    text-align:center;font-family:var(--font-mono);font-size:11px;color:var(--text-dim);
    text-transform:uppercase;letter-spacing:.05em;padding:8px 6px;border-bottom:1px solid var(--border);
  }
  table.standings th:nth-child(2){text-align:left;}
  table.standings td{padding:9px 6px;text-align:center;font-family:var(--font-mono);border-bottom:1px solid var(--border);}
  table.standings td:nth-child(2){text-align:left;font-family:var(--font-body);font-weight:600;}
  table.standings th:last-child, table.standings td:last-child{font-weight:700;color:var(--accent);}
  table.standings tr:last-child td{border-bottom:none;}
  .pos-badge{
    display:inline-flex;align-items:center;justify-content:center;
    width:22px;height:22px;border-radius:50%;font-weight:700;font-size:12px;color:#1a1206;
  }
  .pos-1{background:var(--gold);}
  .pos-2{background:var(--silver);}
  .pos-3{background:var(--bronze);}

  .toolbar{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap;}
  .hint{color:var(--text-dim);font-size:12.5px;margin-top:10px;}
  input[type=file]{display:none;}

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--surface-2);border:1px solid var(--accent);color:var(--text);
    padding:10px 18px;border-radius:8px;font-size:13.5px;font-weight:600;
    opacity:0;pointer-events:none;transition:opacity .25s, transform .25s;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}

  /* Modal / wizard */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(8,10,14,.72);
    display:flex;align-items:center;justify-content:center;padding:20px;z-index:50;
  }
  .modal-panel{
    background:var(--surface);border:1px solid var(--border);border-radius:14px;
    padding:26px;width:100%;max-width:460px;
  }
  .wizard-header{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:18px;}
  .wizard-header h3{font-family:var(--font-display);font-size:20px;margin:0;text-transform:uppercase;letter-spacing:.02em;}
  .wizard-progress{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);white-space:nowrap;}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;}
  .modal-panel .field{margin-bottom:4px;}
  .modal-panel .hint strong{color:var(--text);}

  /* Matches toolbar */
  .matches-toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
  .matches-toolbar-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}

  .score-input{width:52px !important;text-align:center;font-weight:700;font-size:15px;padding:6px 4px;}
  .badge.pending{background:rgba(139,147,163,.15);color:var(--text-dim);}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  const STORAGE_KEY = "liga-tracker-data-v1";

  function uid(){ return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }

  function loadData(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return { leagues: [], activeLeagueId: null };
      const parsed = JSON.parse(raw);
      if(!parsed.leagues) return { leagues: [], activeLeagueId: null };
      return parsed;
    }catch(e){
      console.error("No se pudo leer el almacenamiento local", e);
      return { leagues: [], activeLeagueId: null };
    }
  }

  function saveData(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data));
    }catch(e){
      showToast("No se pudo guardar (almacenamiento lleno o bloqueado)");
      console.error(e);
    }
  }

  const state = {
    data: loadData(),
    activeTab: "jugadores", // jugadores | partidos | clasificacion
    wizard: null, // { step, name, players, numRounds }
    manualFormOpen: false
  };

  function getActiveLeague(){
    return state.data.leagues.find(l => l.id === state.data.activeLeagueId) || null;
  }

  function showToast(msg){
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(showToast._timer);
    showToast._timer = setTimeout(()=> t.classList.remove("show"), 2200);
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  // ---------- Round-robin fixture generation ----------
  function isPlayed(m){
    return m.mapsA !== null && m.mapsA !== undefined && m.mapsB !== null && m.mapsB !== undefined;
  }

  // Classic "circle method": returns array of rounds, each an array of [playerA, playerB] pairs.
  // Guarantees every pair plays exactly once, and no player appears twice within the same round.
  function circleMethod(playerIds){
    let ids = playerIds.slice();
    if(ids.length % 2 !== 0) ids.push(null); // null = bye
    const n = ids.length;
    const fixed = ids[0];
    let rest = ids.slice(1);
    const rounds = [];
    for(let r = 0; r < n - 1; r++){
      const roundIds = [fixed, ...rest];
      const roundMatches = [];
      for(let i = 0; i < n / 2; i++){
        const a = roundIds[i];
        const b = roundIds[n - 1 - i];
        if(a !== null && b !== null) roundMatches.push([a, b]);
      }
      rounds.push(roundMatches);
      rest.unshift(rest.pop());
    }
    return rounds;
  }

  // Interleave matches across the classic rounds so consecutive matches in the
  // flat list tend to involve different players (helps even distribution later).
  function flattenInterleaved(rounds){
    const maxLen = Math.max(0, ...rounds.map(r => r.length));
    const flat = [];
    for(let i = 0; i < maxLen; i++){
      for(let r = 0; r < rounds.length; r++){
        if(rounds[r][i]) flat.push(rounds[r][i]);
      }
    }
    return flat;
  }

  // Greedily bucket matches into `numRounds` slots: prefer the least-filled round
  // where neither player already appears; falls back to the least-filled round
  // overall when that's impossible (only happens if numRounds < minimum rounds needed).
  function distributeMatches(matches, numRounds){
    const buckets = Array.from({ length: numRounds }, () => ({ matches: [], used: new Set() }));
    matches.forEach(([a, b]) => {
      let candidates = buckets
        .map((bkt, idx) => ({ idx, bkt }))
        .filter(o => !o.bkt.used.has(a) && !o.bkt.used.has(b));
      if(candidates.length === 0){
        candidates = buckets.map((bkt, idx) => ({ idx, bkt }));
      }
      candidates.sort((x, y) => x.bkt.matches.length - y.bkt.matches.length || x.idx - y.idx);
      const chosen = candidates[0].bkt;
      chosen.matches.push([a, b]);
      chosen.used.add(a);
      chosen.used.add(b);
    });
    return buckets.map(b => b.matches);
  }

  function recommendedRounds(playerCount){
    return playerCount % 2 === 0 ? playerCount - 1 : playerCount;
  }

  function totalMatchesFor(playerCount){
    return playerCount * (playerCount - 1) / 2;
  }

  function generateFixtures(playerIds, numRounds){
    const rounds = circleMethod(playerIds);
    const flat = flattenInterleaved(rounds);
    const buckets = distributeMatches(flat, numRounds);
    const matches = [];
    buckets.forEach((bucketMatches, idx) => {
      bucketMatches.forEach(([a, b]) => {
        matches.push({ id: uid(), jornada: idx + 1, playerAId: a, playerBId: b, mapsA: null, mapsB: null });
      });
    });
    return matches;
  }

  // ---------- Standings calculation ----------
  function computeStandings(league){
    const stats = {};
    league.players.forEach(p => {
      stats[p.id] = { player:p, PJ:0, G:0, E:0, P:0, MF:0, MC:0, DM:0, Pts:0 };
    });
    league.matches.forEach(m => {
      if(!isPlayed(m)) return;
      const a = stats[m.playerAId], b = stats[m.playerBId];
      if(!a || !b) return;
      a.PJ++; b.PJ++;
      a.MF += m.mapsA; a.MC += m.mapsB;
      b.MF += m.mapsB; b.MC += m.mapsA;
      if(m.mapsA > m.mapsB){ a.G++; b.P++; a.Pts += 3; }
      else if(m.mapsA < m.mapsB){ b.G++; a.P++; b.Pts += 3; }
      else { a.E++; b.E++; a.Pts += 1; b.Pts += 1; }
    });
    const rows = Object.values(stats).map(r => ({...r, DM: r.MF - r.MC}));
    rows.sort((x,y) => {
      if(y.Pts !== x.Pts) return y.Pts - x.Pts;
      if(y.DM !== x.DM) return y.DM - x.DM;
      if(y.MF !== x.MF) return y.MF - x.MF;
      return x.player.name.localeCompare(y.player.name);
    });
    return rows;
  }

  function matchResultBadge(m, league){
    if(m.mapsA > m.mapsB) return `<span class="badge vl">${escapeHtml(playerName(league,m.playerAId))} gana</span>`;
    if(m.mapsA < m.mapsB) return `<span class="badge vv">${escapeHtml(playerName(league,m.playerBId))} gana</span>`;
    return `<span class="badge e">Empate</span>`;
  }

  function playerName(league, id){
    const p = league.players.find(p => p.id === id);
    return p ? p.name : "?";
  }

  // ---------- Rendering ----------
  const app = document.getElementById("app");

  function render(){
    if(state.wizard){
      app.innerHTML = renderWizard();
      bindWizardEvents();
      return;
    }
    const league = getActiveLeague();
    if(!league){
      app.innerHTML = renderHome();
      bindHomeEvents();
    } else {
      app.innerHTML = renderLeague(league);
      bindLeagueEvents(league);
    }
  }

  function openWizard(){
    state.wizard = { step: 1, name: "", players: [], numRounds: null };
    render();
  }

  function renderHome(){
    const leagues = state.data.leagues;
    let cards = leagues.map(l => {
      const played = l.matches.filter(isPlayed).length;
      return `
      <div class="league-card" data-id="${l.id}">
        <div class="name">${escapeHtml(l.name)}</div>
        <div class="meta">${l.players.length} jugadores &middot; ${played}/${l.matches.length} partidos jugados</div>
        <div class="row">
          <button class="btn btn-accent open-league" data-id="${l.id}">Abrir</button>
          <button class="btn btn-ghost btn-sm delete-league" data-id="${l.id}" title="Eliminar liga">Eliminar</button>
        </div>
      </div>
    `;
    }).join("");

    return `
      <div class="app-header">
        <h1>Liga<span>Tracker</span></h1>
        <div class="sub">${leagues.length} liga${leagues.length===1?"":"s"} guardada${leagues.length===1?"":"s"}</div>
      </div>
      <div class="league-grid">
        ${cards}
        <button class="new-league-card" id="new-league-btn">+ Nueva liga</button>
      </div>
      ${leagues.length===0 ? "" : ""}
      <div class="toolbar">
        <button class="btn btn-sm" id="import-btn">Importar JSON</button>
        <input type="file" id="import-file" accept="application/json">
      </div>
    `;
  }

  function bindHomeEvents(){
    document.getElementById("new-league-btn").addEventListener("click", openWizard);
    document.querySelectorAll(".open-league").forEach(btn => {
      btn.addEventListener("click", () => {
        state.data.activeLeagueId = btn.dataset.id;
        state.activeTab = "jugadores";
        saveData();
        render();
      });
    });
    document.querySelectorAll(".delete-league").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        const league = state.data.leagues.find(l => l.id === btn.dataset.id);
        if(!league) return;
        if(!confirm(`¿Eliminar la liga "${league.name}"? Esta acción no se puede deshacer.`)) return;
        state.data.leagues = state.data.leagues.filter(l => l.id !== btn.dataset.id);
        saveData();
        render();
      });
    });
    const importBtn = document.getElementById("import-btn");
    const importFile = document.getElementById("import-file");
    importBtn.addEventListener("click", () => importFile.click());
    importFile.addEventListener("change", handleImport);
  }

  function handleImport(e){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const parsed = JSON.parse(reader.result);
        const incoming = Array.isArray(parsed.leagues) ? parsed.leagues : (parsed.id ? [parsed] : null);
        if(!incoming) throw new Error("Formato no reconocido");
        incoming.forEach(l => {
          l.id = uid(); // avoid collisions
          state.data.leagues.push(l);
        });
        saveData();
        render();
        showToast(`Importada${incoming.length===1?"":"s"} ${incoming.length} liga${incoming.length===1?"":"s"}`);
      }catch(err){
        alert("No se pudo importar el archivo: " + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  // ---------- New league wizard ----------
  function renderWizard(){
    const w = state.wizard;
    let inner;
    if(w.step === 1) inner = wizardStepName(w);
    else if(w.step === 2) inner = wizardStepPlayers(w);
    else inner = wizardStepRounds(w);
    return `
      <div class="modal-overlay" id="wizard-overlay">
        <div class="modal-panel">${inner}</div>
      </div>
    `;
  }

  function wizardStepName(w){
    return `
      <div class="wizard-header"><h3>Nueva liga</h3><span class="wizard-progress">Paso 1 de 3</span></div>
      <form id="wizard-step1">
        <div class="field">
          <label for="wizard-name">Nombre de la liga</label>
          <input type="text" id="wizard-name" value="${escapeHtml(w.name)}" placeholder="Ej. Liga de Verano" autofocus>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="wizard-cancel">Cancelar</button>
          <button type="submit" class="btn btn-accent">Continuar</button>
        </div>
      </form>
    `;
  }

  function wizardStepPlayers(w){
    const chips = w.players.map(p => `
      <div class="player-chip">
        ${escapeHtml(p.name)}
        <button type="button" class="remove-wizard-player" data-id="${p.id}" title="Quitar">&times;</button>
      </div>
    `).join("") || `<span class="hint">Añade jugadores para empezar.</span>`;

    return `
      <div class="wizard-header"><h3>${escapeHtml(w.name)}</h3><span class="wizard-progress">Paso 2 de 3</span></div>
      <form id="wizard-add-player" class="form-row">
        <div class="field">
          <label for="wizard-player-name">Jugador</label>
          <input type="text" id="wizard-player-name" placeholder="Nombre del jugador" autofocus>
        </div>
        <button class="btn btn-accent" type="submit">Añadir</button>
      </form>
      <div class="player-list">${chips}</div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="wizard-back">Atrás</button>
        <button type="button" class="btn btn-accent" id="wizard-next-2">Continuar</button>
      </div>
    `;
  }

  function wizardStepRounds(w){
    const n = w.players.length;
    const total = totalMatchesFor(n);
    const rec = recommendedRounds(n);
    const avg = (total / rec).toFixed(1);
    return `
      <div class="wizard-header"><h3>${escapeHtml(w.name)}</h3><span class="wizard-progress">Paso 3 de 3</span></div>
      <p class="hint">Con ${n} jugadores, cada uno se enfrenta a todos los demás una vez: <strong>${total} partidos</strong> en total.</p>
      <div class="field">
        <label for="wizard-rounds">Número de jornadas</label>
        <input type="number" id="wizard-rounds" min="1" max="${total}" value="${w.numRounds ?? rec}">
      </div>
      <p class="hint">Recomendado: <strong>${rec} jornadas</strong> (~${avg} partidos por jornada, sin repetir jugador en la misma jornada). Elige más jornadas para repartir los partidos, o menos para tener varios partidos por jornada.</p>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="wizard-back2">Atrás</button>
        <button type="button" class="btn btn-accent" id="wizard-generate">Generar calendario</button>
      </div>
    `;
  }

  function bindWizardEvents(){
    const w = state.wizard;
    const overlay = document.getElementById("wizard-overlay");
    overlay.addEventListener("click", (e) => {
      if(e.target === overlay){ state.wizard = null; render(); }
    });

    const step1 = document.getElementById("wizard-step1");
    if(step1){
      document.getElementById("wizard-cancel").addEventListener("click", () => { state.wizard = null; render(); });
      step1.addEventListener("submit", (e) => {
        e.preventDefault();
        const val = document.getElementById("wizard-name").value.trim();
        if(!val){ alert("Ponle un nombre a la liga."); return; }
        w.name = val;
        w.step = 2;
        render();
      });
    }

    const addPlayerForm = document.getElementById("wizard-add-player");
    if(addPlayerForm){
      addPlayerForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const input = document.getElementById("wizard-player-name");
        const name = input.value.trim();
        if(!name) return;
        w.players.push({ id: uid(), name });
        render();
      });
      document.querySelectorAll(".remove-wizard-player").forEach(btn => {
        btn.addEventListener("click", () => {
          w.players = w.players.filter(p => p.id !== btn.dataset.id);
          render();
        });
      });
      document.getElementById("wizard-back").addEventListener("click", () => { w.step = 1; render(); });
      document.getElementById("wizard-next-2").addEventListener("click", () => {
        if(w.players.length < 2){ alert("Añade al menos 2 jugadores."); return; }
        w.step = 3;
        render();
      });
    }

    const genBtn = document.getElementById("wizard-generate");
    if(genBtn){
      document.getElementById("wizard-back2").addEventListener("click", () => { w.step = 2; render(); });
      genBtn.addEventListener("click", () => {
        const n = w.players.length;
        const total = totalMatchesFor(n);
        let numRounds = parseInt(document.getElementById("wizard-rounds").value, 10);
        if(!numRounds || numRounds < 1) numRounds = recommendedRounds(n);
        if(numRounds > total) numRounds = total;
        const playerIds = w.players.map(p => p.id);
        const matches = generateFixtures(playerIds, numRounds);
        const league = { id: uid(), name: w.name, createdAt: Date.now(), players: w.players, matches };
        state.data.leagues.push(league);
        state.data.activeLeagueId = league.id;
        state.activeTab = "partidos";
        state.wizard = null;
        saveData();
        render();
        showToast(`Liga creada: ${total} partidos en ${numRounds} jornadas`);
      });
    }
  }

  function renderLeague(league){
    return `
      <div class="league-topbar">
        <button class="btn btn-sm" id="back-btn">&larr; Ligas</button>
        <h2>${escapeHtml(league.name)}</h2>
        <div class="spacer"></div>
        <button class="btn btn-sm" id="rename-btn">Renombrar</button>
        <button class="btn btn-sm" id="export-btn">Exportar</button>
      </div>
      <div class="tabs">
        <button class="tab ${state.activeTab==='jugadores'?'active':''}" data-tab="jugadores">Jugadores</button>
        <button class="tab ${state.activeTab==='partidos'?'active':''}" data-tab="partidos">Partidos</button>
        <button class="tab ${state.activeTab==='clasificacion'?'active':''}" data-tab="clasificacion">Clasificación</button>
      </div>
      <div id="tab-content">
        ${state.activeTab==='jugadores' ? renderPlayersTab(league) : ""}
        ${state.activeTab==='partidos' ? renderMatchesTab(league) : ""}
        ${state.activeTab==='clasificacion' ? renderStandingsTab(league) : ""}
      </div>
    `;
  }

  function renderPlayersTab(league){
    const chips = league.players.map(p => `
      <div class="player-chip">
        ${escapeHtml(p.name)}
        <button class="remove-player" data-id="${p.id}" title="Eliminar jugador">&times;</button>
      </div>
    `).join("") || `<span class="hint">Todavía no hay jugadores.</span>`;

    return `
      <div class="panel">
        <h3>Añadir jugador</h3>
        <form id="add-player-form" class="form-row">
          <div class="field">
            <label for="player-name">Nombre</label>
            <input type="text" id="player-name" placeholder="Nombre del jugador" required>
          </div>
          <button class="btn btn-accent" type="submit">Añadir</button>
        </form>
        <div class="player-list">${chips}</div>
      </div>
    `;
  }

  function renderMatchRow(m, league){
    const played = isPlayed(m);
    return `
      <form class="match-row" data-id="${m.id}">
        <div class="pname">${escapeHtml(playerName(league,m.playerAId))}</div>
        <input type="number" class="score-input" name="mapsA" min="0" placeholder="-" value="${played ? m.mapsA : ""}">
        <div class="dash">&ndash;</div>
        <input type="number" class="score-input" name="mapsB" min="0" placeholder="-" value="${played ? m.mapsB : ""}">
        <div class="pname away">${escapeHtml(playerName(league,m.playerBId))}</div>
        ${played ? matchResultBadge(m, league) : `<span class="badge pending">Pendiente</span>`}
        <div class="match-actions">
          <button type="submit" class="btn btn-accent btn-sm">${played ? "Actualizar" : "Guardar"}</button>
          <button type="button" class="btn btn-ghost btn-sm delete-match" data-id="${m.id}">Eliminar</button>
        </div>
      </form>
    `;
  }

  function renderMatchesTab(league){
    if(league.players.length < 2){
      return `<div class="empty-state"><div class="big">Añade al menos 2 jugadores</div>Ve a la pestaña Jugadores para empezar.</div>`;
    }
    const options = league.players.map(p => `<option value="${p.id}">${escapeHtml(p.name)}</option>`).join("");
    const maxJornada = league.matches.reduce((m, x) => Math.max(m, x.jornada || 1), 0);
    const playedCount = league.matches.filter(isPlayed).length;

    const groups = {};
    league.matches.forEach(m => {
      (groups[m.jornada] = groups[m.jornada] || []).push(m);
    });
    const jornadaKeys = Object.keys(groups).map(Number).sort((a,b)=>a-b);

    const matchesHtml = jornadaKeys.map(j => `
      <div class="jornada-group">
        <div class="jornada-label">Jornada ${j}</div>
        ${groups[j].map(m => renderMatchRow(m, league)).join("")}
      </div>
    `).join("") || `<div class="hint">Todavía no hay partidos programados. Usa "Regenerar calendario" o añade partidos manualmente.</div>`;

    return `
      <div class="panel">
        <div class="matches-toolbar">
          <h3 style="margin:0;">Calendario</h3>
          <div class="matches-toolbar-actions">
            <span class="hint" style="margin:0;">${playedCount}/${league.matches.length} jugados</span>
            <button class="btn btn-sm" id="regen-schedule-btn">Regenerar calendario</button>
            <button class="btn btn-sm" id="toggle-manual-form">${state.manualFormOpen ? "Ocultar formulario" : "+ Partido manual"}</button>
          </div>
        </div>
        ${state.manualFormOpen ? `
          <form id="add-match-form" class="form-row" style="margin-top:16px;">
            <div class="field">
              <label for="m-jornada">Jornada</label>
              <input type="number" id="m-jornada" min="1" value="${maxJornada + 1 || 1}" required>
            </div>
            <div class="field">
              <label for="m-playerA">Jugador local</label>
              <select id="m-playerA" required>${options}</select>
            </div>
            <div class="field">
              <label for="m-mapsA">Mapas</label>
              <input type="number" id="m-mapsA" min="0" value="0" required>
            </div>
            <div class="field">
              <label for="m-mapsB">Mapas</label>
              <input type="number" id="m-mapsB" min="0" value="0" required>
            </div>
            <div class="field">
              <label for="m-playerB">Jugador visitante</label>
              <select id="m-playerB" required>${options}</select>
            </div>
            <button class="btn btn-accent" type="submit">Añadir partido</button>
          </form>
        ` : ""}
      </div>
      <div class="panel">
        ${matchesHtml}
      </div>
    `;
  }

  function renderStandingsTab(league){
    if(league.players.length === 0){
      return `<div class="empty-state"><div class="big">Sin jugadores todavía</div>La clasificación aparecerá aquí cuando añadas jugadores y partidos.</div>`;
    }
    const rows = computeStandings(league);
    const body = rows.map((r, i) => {
      const pos = i+1;
      const posClass = pos===1?"pos-1":pos===2?"pos-2":pos===3?"pos-3":"";
      return `
        <tr>
          <td>${posClass ? `<span class="pos-badge ${posClass}">${pos}</span>` : pos}</td>
          <td>${escapeHtml(r.player.name)}</td>
          <td>${r.PJ}</td>
          <td>${r.G}</td>
          <td>${r.E}</td>
          <td>${r.P}</td>
          <td>${r.MF}</td>
          <td>${r.MC}</td>
          <td>${r.DM > 0 ? "+"+r.DM : r.DM}</td>
          <td>${r.Pts}</td>
        </tr>
      `;
    }).join("");

    return `
      <div class="panel">
        <table class="standings">
          <thead>
            <tr>
              <th>Pos</th><th>Jugador</th><th>PJ</th><th>G</th><th>E</th><th>P</th>
              <th>MF</th><th>MC</th><th>DM</th><th>Pts</th>
            </tr>
          </thead>
          <tbody>${body}</tbody>
        </table>
        <div class="hint">Desempate: Puntos &rarr; Diferencia de mapas (DM) &rarr; Mapas a favor (MF)</div>
      </div>
    `;
  }

  function bindLeagueEvents(league){
    document.getElementById("back-btn").addEventListener("click", () => {
      state.data.activeLeagueId = null;
      saveData();
      render();
    });
    document.getElementById("rename-btn").addEventListener("click", () => {
      const name = prompt("Nuevo nombre de la liga:", league.name);
      if(!name) return;
      league.name = name.trim();
      saveData();
      render();
    });
    document.getElementById("export-btn").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify({ leagues: [league] }, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${league.name.replace(/[^a-z0-9]+/gi,"_")}.json`;
      a.click();
      URL.revokeObjectURL(url);
    });

    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        state.activeTab = tab.dataset.tab;
        render();
      });
    });

    const addPlayerForm = document.getElementById("add-player-form");
    if(addPlayerForm){
      addPlayerForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const input = document.getElementById("player-name");
        const name = input.value.trim();
        if(!name) return;
        league.players.push({ id: uid(), name });
        saveData();
        render();
      });
      document.querySelectorAll(".remove-player").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = btn.dataset.id;
          const usedInMatch = league.matches.some(m => m.playerAId === id || m.playerBId === id);
          if(usedInMatch && !confirm("Este jugador tiene partidos registrados. ¿Eliminarlo y sus partidos asociados?")) return;
          league.players = league.players.filter(p => p.id !== id);
          if(usedInMatch){
            league.matches = league.matches.filter(m => m.playerAId !== id && m.playerBId !== id);
          }
          saveData();
          render();
        });
      });
    }

    const addMatchForm = document.getElementById("add-match-form");
    if(addMatchForm){
      addMatchForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const jornada = parseInt(document.getElementById("m-jornada").value, 10) || 1;
        const playerAId = document.getElementById("m-playerA").value;
        const playerBId = document.getElementById("m-playerB").value;
        const mapsA = parseInt(document.getElementById("m-mapsA").value, 10) || 0;
        const mapsB = parseInt(document.getElementById("m-mapsB").value, 10) || 0;
        if(playerAId === playerBId){
          alert("El jugador local y el visitante deben ser distintos.");
          return;
        }
        league.matches.push({ id: uid(), jornada, playerAId, mapsA, playerBId, mapsB });
        saveData();
        render();
      });
    }

    const toggleManualBtn = document.getElementById("toggle-manual-form");
    if(toggleManualBtn){
      toggleManualBtn.addEventListener("click", () => {
        state.manualFormOpen = !state.manualFormOpen;
        render();
      });
    }

    const regenBtn = document.getElementById("regen-schedule-btn");
    if(regenBtn){
      regenBtn.addEventListener("click", () => {
        if(league.players.length < 2){ alert("Necesitas al menos 2 jugadores."); return; }
        const total = totalMatchesFor(league.players.length);
        const rec = recommendedRounds(league.players.length);
        const input = prompt(`¿En cuántas jornadas quieres repartir los ${total} partidos? (recomendado: ${rec})`, rec);
        if(input === null) return;
        let numRounds = parseInt(input, 10);
        if(!numRounds || numRounds < 1) numRounds = rec;
        if(numRounds > total) numRounds = total;
        if(!confirm("Esto borrará todos los partidos y resultados actuales de esta liga y generará un calendario nuevo. ¿Continuar?")) return;
        const playerIds = league.players.map(p => p.id);
        league.matches = generateFixtures(playerIds, numRounds);
        saveData();
        render();
        showToast("Calendario regenerado");
      });
    }

    document.querySelectorAll(".match-row").forEach(form => {
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const id = form.dataset.id;
        const match = league.matches.find(m => m.id === id);
        if(!match) return;
        const aVal = form.querySelector('[name="mapsA"]').value;
        const bVal = form.querySelector('[name="mapsB"]').value;
        if(aVal === "" || bVal === ""){
          alert("Introduce el resultado de ambos jugadores.");
          return;
        }
        match.mapsA = parseInt(aVal, 10) || 0;
        match.mapsB = parseInt(bVal, 10) || 0;
        saveData();
        render();
      });
    });
    document.querySelectorAll(".delete-match").forEach(btn => {
      btn.addEventListener("click", () => {
        league.matches = league.matches.filter(m => m.id !== btn.dataset.id);
        saveData();
        render();
      });
    });
  }

  render();
})();
</script>
</body>
</html>
